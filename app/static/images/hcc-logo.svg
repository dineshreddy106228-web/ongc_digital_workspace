<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 110 46" width="110" height="46" role="img" aria-label="HCC">

  <!-- Hexagon mark (chemistry motif) -->
  <g transform="translate(4,4)">
    <!-- outer hexagon -->
    <polygon points="19,1  34,9  34,25  19,33  4,25  4,9"
             fill="none" stroke="#22d3ee" stroke-width="2.2" stroke-linejoin="round"/>
    <!-- inner filled hexagon -->
    <polygon points="19,6  29,12  29,24  19,30  9,24  9,12"
             fill="#0e7490" opacity="0.85"/>
    <!-- centre atom / molecule dots -->
    <circle cx="19" cy="18" r="2.8" fill="#ffffff"/>
    <circle cx="13" cy="14" r="1.5" fill="#22d3ee"/>
    <circle cx="25" cy="14" r="1.5" fill="#22d3ee"/>
    <circle cx="13" cy="22" r="1.5" fill="#22d3ee"/>
    <circle cx="25" cy="22" r="1.5" fill="#22d3ee"/>
    <!-- bond lines -->
    <line x1="19" y1="18" x2="13" y2="14" stroke="#22d3ee" stroke-width="0.9"/>
    <line x1="19" y1="18" x2="25" y2="14" stroke="#22d3ee" stroke-width="0.9"/>
    <line x1="19" y1="18" x2="13" y2="22" stroke="#22d3ee" stroke-width="0.9"/>
    <line x1="19" y1="18" x2="25" y2="22" stroke="#22d3ee" stroke-width="0.9"/>
  </g>

  <!-- HCC wordmark -->
  <text x="46" y="27"
        font-family="Arial Black, Arial, sans-serif"
        font-size="17" font-weight="900"
        fill="#ffffff" letter-spacing="0.5">HCC</text>

  <!-- Tagline -->
  <text x="46" y="39"
        font-family="Arial, Helvetica, sans-serif"
        font-size="6" fill="#9ca3af" letter-spacing="0.6"
        text-rendering="optimizeLegibility">CORPORATE CHEMISTRY CENTRE</text>
</svg>
