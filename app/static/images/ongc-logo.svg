<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 130 46" width="130" height="46" role="img" aria-label="ONGC">

  <!-- Stylised oil-flame symbol -->
  <g transform="translate(3,3)">
    <!-- outer flame body -->
    <path d="M19,38 C10,38 4,31 6,21 C7,15 11,10 14,7
             C13,13 16,17 19,17
             C22,17 24,14 22,9
             C27,14 32,21 30,29
             C28,35 24,38 19,38 Z"
          fill="#f97316"/>
    <!-- inner highlight -->
    <path d="M19,38 C14,38 10,33 12,26
             C14,21 17,19 19,22
             C22,17 24,14 22,9
             C27,14 32,21 30,29
             C28,35 24,38 19,38 Z"
          fill="#fbbf24" opacity="0.75"/>
    <!-- base drop / ground -->
    <ellipse cx="19" cy="39" rx="7" ry="2.5" fill="#f97316" opacity="0.4"/>
  </g>

  <!-- ONGC wordmark -->
  <text x="45" y="27"
        font-family="Arial Black, Arial, sans-serif"
        font-size="17" font-weight="900"
        fill="#ffffff" letter-spacing="0.5">ONGC</text>

  <!-- Tagline -->
  <text x="45" y="39"
        font-family="Arial, Helvetica, sans-serif"
        font-size="6" fill="#9ca3af" letter-spacing="0.6"
        text-rendering="optimizeLegibility">OIL AND NATURAL GAS CORPORATION</text>
</svg>
