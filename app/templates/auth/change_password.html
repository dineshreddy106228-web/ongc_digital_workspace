{% extends "base.html" %}
{% block title %}Change Password – {{ app_name }}{% endblock %}

{% block content %}
<div class="auth-wrapper">
    <div class="auth-card">
        <div class="auth-header">
            <h1>Change Password</h1>
            <p class="auth-subtitle">Choose a strong password (min 8 characters)</p>
        </div>

        <form method="POST" action="{{ url_for('auth.change_password') }}" autocomplete="off" novalidate>
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

            <div class="form-group">
                <label for="current_password">Current Password</label>
                <input type="password" id="current_password" name="current_password"
                       required maxlength="128" autocomplete="current-password"
                       placeholder="Your existing password">
            </div>

            <div class="form-group">
                <label for="new_password">New Password</label>
                <input type="password" id="new_password" name="new_password"
                       required minlength="8" maxlength="128" autocomplete="new-password"
                       placeholder="At least 8 characters">
            </div>

            <div class="form-group">
                <label for="confirm_password">Confirm New Password</label>
                <input type="password" id="confirm_password" name="confirm_password"
                       required minlength="8" maxlength="128" autocomplete="new-password"
                       placeholder="Repeat new password">
            </div>

            <button type="submit" class="btn btn-primary btn-block">Update Password</button>
            <a href="{{ url_for('main.dashboard') }}" class="btn btn-outline btn-block" style="margin-top:.75rem">Cancel</a>
        </form>
    </div>
</div>
{% endblock %}
